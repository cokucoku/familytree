<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>
<body>
<style>
* {
  margin: 0;
  padding: 0px;
  list-style: none;
  box-sizing: border-box;
}

.win {
  width: 1000px;
  height: 620px;
  background: #fff;
  position: fixed;
  left: 50%;
  top: 50%;
  margin-left: -500px;
  margin-top: -310px;
  z-index: 99;
  border: solid 8px #444;
}

.win .content {
  color: #333;
  padding: 35px;
  overflow-y: auto;
  height: 604px;
}

.win .content p {
  margin-bottom: 15px;
}

.win .content a {
  color: #f60;
  text-decoration: none;
  background: #fafafa;
  padding: 1px 5px;
  border-radius: 6px;
}

.win .title {
  text-align: center;
  padding-bottom: 15px;
}

.win i {
  color: #fff;
  font-style: normal;
  background: #f60;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 100%;
  font-size: 32px;
  font-weight: bold;
  position: absolute;
  right: 0;
  cursor: pointer;
  margin-top: -30px;
  margin-right: -30px;

}

.f12 {
  font-size: 12px;
}

.f15 {
  font-size: 15px;
}

#app {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

body {
  font-size: 14px;
}

ul {
  display: flex;
  flex-wrap: wrap;
  writing-mode: vertical-lr;
}

ul li {
  width: 330px;
  height: 90px;
  writing-mode: horizontal-tb;
  margin: 0 12px 12px;
  display: flex;
  transition: all .4s;
  cursor: pointer;
}

ul li:hover {
  background: #555;
}

ul li img {
  width: 120px;
  height: 90px;
  object-fit: cover;
  object-position: top;
  -webkit-user-drag: none;
}

ul li .text {
  width: 210px;
  height: 100%;
  padding-left: 12px;
}

ul li .text .time {
  border-bottom: 1px solid hsla(0, 0%, 100%, .23);
}


ul li:nth-child(3n) {
  margin-bottom: 0;
}

#app {
  height: 100vh;
  display: flex;
  align-items: center;
  color: #fff;
  background: url("https://static.allhistory.com/online/view/Index/img/history.5290.png") no-repeat center fixed;
  background-size: cover;
}

.ul {
  height: 364px;
  padding: 20px 0;
  display: flex;
  align-items: center;
  position: relative;
  user-select: none;
  background: rgba(0, 0, 12, .4);
}

.ul .li {
  display: flex;
  align-items: center;
  height: 100%;
  margin-left: 50px;
  background: rgba(0, 0, 0, .4);
  position: relative;
  z-index: 2;
  padding: 15px;
}

.ul .li .lih {
  width: 294px;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  cursor: pointer;
}

.ul .li .lih img {
  position: absolute;
  z-index: 1;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.mark {
  background: linear-gradient(180deg, rgba(93, 93, 93, .04), rgba(15, 15, 15, .5));
  position: absolute;
  z-index: 1;
  width: 100%;
  height: 100%;
  left: 0;
  top: 0;
}

.ul .li .lih .text {
  z-index: 2;
  position: relative;
  padding: 15px;
}

.ul .li .lih .text .time {
  border-bottom: 1px solid hsla(0, 0%, 100%, .23);
}


.ul .li .lil {
  width: 250px;
  padding: 30px;
  background-color: rgba(255, 102, 0, 0.7);
  height: 100%;
  cursor: pointer;
}

.ul .li .lil .time {
  padding: 6px 0 10px;
}


.ul .li .lih, .ul .li ul {
  height: 100%;
}

@media (max-width: 768px) {
  .win {
    width: 90%;
    margin-left: -45%;
    height: 50vh;
    margin-top: -25vh;
  }

  .win .content {
    height: calc(50vh - 16px);
    padding: 15px;
  }

  .win i {
    width: 30px;
    height: 30px;
    margin-right: -15px;
    margin-top: -15px;
    font-size: 18px;
  }
}
</style>
<div id="app">
  <div class="win" v-if="show">
    <i @click="show=false">X</i>
    <div class="content">
      <h1 class="title">{{curContent.title}}</h1>
      <div content="nr" v-html="curContent.content"></div>
    </div>
  </div>
  <div class="ul" ref="ul" :style="widthStyle" @mousedown="mousedown" @mousemove="mousemove" @mouseup="mouseup"
       @mouseleave="mouseleave" @touchstart="touchstart" @touchmove="touchmove" @touchend="touchend">
    <div class="li" v-for="item in topList" :style="kk(item.level)">
      <div class="lil" v-if="item.level==0" @click="tan(item.id)">
        <h2 class="title">{{item.title}}</h2>
        <div class="time">{{item.mtime}}</div>
        <div class="ms">{{item.ms}}</div>
      </div>
      <div class="lih" v-else @click="tan(item.id)">
        <img :src="item.img">
        <div class="mark"></div>
        <div class="text">
          <h2 class="time">{{item.mtime}}</h2>
          <h2 class="title">{{item.title}}</h2>
          <div class="ms f12">{{item.ms}}</div>
        </div>
      </div>
      <ul v-if="childList(item.id).length>0">
        <li v-for="it in childList(item.id)" @click="tan(it.id)">
          <img :src="it.img">
          <div class="text">
            <div class="time">{{it.mtime}}</div>
            <div class="title f15">{{it.title}}</div>
            <div class="ms f12">{{it.ms}}</div>
          </div>
        </li>
      </ul>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@0.22.0/dist/axios.min.js"></script>
<script src="https://cdn.bootcss.com/qs/6.7.0/qs.min.js"></script>
<script>
new Vue({
    el: '#app',
    data: {
        list: [],
        scrollX: 0,//拖动移动的距离
        saveX: 0,//拖动后保存位置,很重要必须
        isDown: false,
        isClick: false,//这个是为了解决是点击还是mouseup冲突问题
        oldX: 0,
        sw: window.innerWidth,
        //scrollW: 0,
        maxX:0,
        moveX: 0,//移动端touchup没有event.targetTouches了，所以要用这个来存，为了统一，PC端也借助这个
        show: false,
        curContent: '',
        duration: 0
    },
    mounted() {
        let list = [
            {
                id: 1,
                mtime: '1368年-1644年',
                title: '明朝',
                img: '',
                ms: '明朝国号为“大明”，由朱元璋建立，共传十六帝，享国二百七十六年，上承元朝，下启清朝。大明幅员辽阔，北达阴山、东抵日本海、西至哈密，明都初在应天府，后定于顺天府。',
                content: '',
                level: 0,
                pid: ''
            },
            {
                id: 2,
                mtime: '1604年-1662年',
                title: '东林党争',
                img: 'https://pic.allhistory.com/T1JtDCByhT1RCvBVdK.jpeg?w=292&h=292',
                ms: '明末以江南士大夫为主的政治集团东林党与全国朋党集团之争。',
                content: '',
                pid: ''
            },
            {
                id: 3,
                mtime: '1598年-1603年',
                title: '二书二楚',
                img: 'https://pic.allhistory.com/T1JtDCByhT1RCvBVdK.jpeg?w=292&h=292',
                ms: '由国本之争引起的一连串党争事件，即两次妖书案，两次楚藩案。',
                content: '<p><b>楚宗之乱</b>，是<a data-id="59045016977fd57b59a834d3" data-type="entry" href="/detail/59045016977fd57b59a834d3" target="_blank">明神宗</a><a data-id="591adc0c55b5427dfa020842" data-type="entry" href="/detail/591adc0c55b5427dfa020842" target="_blank">万历</a>年间的四次政治案件，是一场由于<a data-id="59244e5255b54278ac02b331" data-type="entry" href="/detail/59244e5255b54278ac02b331" target="_blank">国本之争</a>引起的一连串<a data-id="59241f0a55b54278ac009b6d" data-type="entry" href="/detail/59241f0a55b54278ac009b6d" target="_blank">东林党争</a>事件，即两次<a data-id="59241f0b55b54278ac009b72" data-type="entry" href="/detail/59241f0b55b54278ac009b72" target="_blank">妖书案</a>，两次<a data-id="5924af0955b54278ac065aed" data-type="entry" href="/detail/5924af0955b54278ac065aed" target="_blank">楚藩案</a>，又称<b>二书二楚</b>。</p><p><a data-id="59045016977fd57b59a834d3" data-type="entry" href="/detail/59045016977fd57b59a834d3" target="_blank">明神宗</a>宠爱<a data-id="591ac24d55b5427dfa0171cf" data-type="entry" href="/detail/591ac24d55b5427dfa0171cf" target="_blank">郑贵妃</a>之子福王<a data-id="591adcca55b5427dfa020d87" data-type="entry" href="/detail/591adcca55b5427dfa020d87" target="_blank">朱常洵</a>，图以为<a data-id="59243f2255b54278ac01f9f4" data-type="entry" href="/detail/59243f2255b54278ac01f9f4" target="_blank">皇储</a>，但太子<a data-id="585ce8b5bf69283619d84b0f" data-type="entry" href="/detail/585ce8b5bf69283619d84b0f" target="_blank">朱常洛</a>受到群臣支持，神宗忿以消极方式抵抗，甚至几十年不上朝，是为<a data-id="59244e5255b54278ac02b331" data-type="entry" href="/detail/59244e5255b54278ac02b331" target="_blank">国本之争</a>，郑贵妃一直在宫中生事，要让福王争夺储君之位，于是朝中有人刊印了政治文宣《忧危竑议》，宣传郑妃之恶，被<a data-id="59241ace55b54278ac00644d" data-type="entry" href="/detail/59241ace55b54278ac00644d" target="_blank">朝廷</a>视为“妖书”，此即<a data-id="5924a83955b54278ac05ff5d" data-type="entry" href="/detail/5924a83955b54278ac05ff5d" target="_blank">第一次妖书案</a>，朝中也因此党争不断。</p>',
                pid: '2'
            },
            {
                id: 4,
                mtime: '万历年间',
                title: '齐楚浙党',
                img: 'https://pic.allhistory.com/T1GyECByxT1RCvBVdK.jpeg?w=292&h=292',
                ms: '明末因地缘关系结成的政治派系，主要反对东林党。',
                content: '',
                pid: '2'
            },
            {
                id: 5,
                mtime: '万历年间',
                title: '东林党',
                img: 'https://pic.allhistory.com/T1.tDCBbZT1RCvBVdK.jpeg?w=292&h=292',
                ms: '顾宪成等讲学于东林书院，讽议时政，士大夫们依附，人称东林党。',
                content: '',
                pid: '2'
            },
            {
                id: 6,
                mtime: '万历年间',
                title: '阉党',
                img: 'https://pic.allhistory.com/T1haZCByhT1RCvBVdK.jpeg?w=292&h=292',
                ms: '与东林党抗衡的士大夫们逐渐向魏忠贤靠拢，被称为阉党。',
                content: '',
                pid: '2'
            },
            {
                id: 7,
                mtime: '1662年-1683年',
                title: '郑成功建立明郑',
                img: 'https://pic.allhistory.com/T1LxLyB5Cv1RCvBVdK.jpeg?w=292&h=292',
                ms: '明末以江南士大夫为主的政治集团东林党与全国朋党集团之争。',
                content: '',
                pid: ''
            },
            {
                id: 8,
                mtime: '1604年-1661年',
                title: '郑芝龙',
                img: 'https://pic.allhistory.com/T1IRdCByZT1RCvBVdK.jpeg?w=292&h=292',
                ms: '明末以江南士大夫为主的政治集团东林党与全国朋党集团之争。',
                content: '',
                pid: '7'
            },

        ]
        this.list = list
        window.addEventListener("resize", () => {
            this.sw = window.innerWidth
        })
    },
    watch: {
        sw: {
            immediate: true,
            handler(value) {
                setTimeout(() => {
                    let scrollW = this.$refs.ul.scrollWidth
                    this.maxX = (scrollW - value) * -1
                        if (this.scrollX < this.maxX) {
                        this.scrollX = this.maxX
                        this.saveX = this.scrollX
                    }
                }, 1)
            }
        },
        isDown: {
            immediate: true,
            handler(value) {
                if (value) {
                    this.duration = 0
                } else {
                    this.duration = 400
                }

            }
        },
    },
    computed: {
        topList() {
            let fi = this.list.filter((el) => {
                return el.pid == ''
            })
            return fi
        },
        widthStyle() {
            return 'transform:translateX(' + this.scrollX + 'px);transition-duration:' + this.duration + 'ms'
        },
    },
    methods: {
        tan(id) {
            if (this.isClick) {
                this.show = true
                let fi = this.list.filter((el) => {
                    return el.id == id
                })
                this.curContent = fi[0]
            }
        },
        kk(level) {
            if (level != undefined) {
                return 'padding:0'
            }
        },
        childList(id) {
            let fi = this.list.filter((el) => {
                return el.pid == id
            })
            return fi
        },
        huitan() {
            this.isDown = false
            if (this.scrollX > 0) {
                this.scrollX = 0
            }
            if (this.scrollX < this.maxX) {
                this.scrollX = this.maxX
            }
            this.saveX = this.scrollX

        },
        mousedown() {
            this.isDown = true
            this.oldX = event.pageX
        },
        mousemove() {
            if (this.isDown) {
                let newX = event.pageX
                this.moveX = newX - this.oldX
                let dis = this.saveX + this.moveX
                if (dis > 0) {
                    dis = (this.saveX + this.moveX) * 0.2
                }

                if (dis < this.maxX) {
                    //dis= this.saveX + this.moveX+(maxX-(this.saveX + this.moveX))*0.8
                    dis = (this.saveX + this.moveX) * 0.2 + 0.8 * this.maxX
                }
                this.scrollX = dis
            }

        },
        mouseup() {
            if (Math.abs(event.pageX - this.oldX) > 0) {
                this.isClick = false
            } else {
                this.isClick = true
            }
            this.huitan()
        },
        mouseleave() {
            this.huitan()
        },
        touchstart() {
            this.isDown = true
            this.oldX = event.targetTouches[0].pageX
        },
        touchmove() {
            if (this.isDown) {
                let newX = event.targetTouches[0].pageX
                this.moveX = newX - this.oldX
                let dis = this.saveX + this.moveX
                if (dis > 0) {
                    dis = (this.saveX + this.moveX) * 0.2
                }

                if (dis < this.maxX) {
                    dis = (this.saveX + this.moveX) * 0.2 + 0.8 * this.maxX
                }

                this.scrollX = dis
            }
        },
        touchend() {
            if (Math.abs(this.moveX) > 0) {
                this.isClick = false
            } else {
                this.isClick = true
            }
            this.huitan()
        },
    }
})

</script>
</body>
</html>
